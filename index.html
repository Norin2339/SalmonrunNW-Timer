<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>サーモンラン簡易タイマー</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 20px; }
  #time { font-size: 48px; margin: 20px 0; }
</style>
</head>
<body>

<h1>サーモンラン簡易タイマー</h1>
<div id="time">0.0</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<!-- ここに追加 -->
<button onclick="document.getElementById('beep_short').play()">短音テスト</button>
<button onclick="document.getElementById('beep_long').play()">長音テスト</button>

<audio id="beep_short" src="audio/beep_short.wav"></audio>
<audio id="beep_long" src="audio/beep_long.wav"></audio>

<script>
let startTime = 0;
let running = false;
let rafId = null;

const TOTAL_TIME = 117;

const events = [
  { time: 48, sound: "beep_short", played: false },
  { time: 47, sound: "beep_short", played: false },
  { time: 46, sound: "beep_short", played: false },
  { time: 45, sound: "beep_long",  played: false }
];

function update() {
  const now = performance.now();
  const elapsed = (now - startTime) / 1000;
  const remaining = TOTAL_TIME - elapsed;

  // 表示用の残り時間（100秒基準）
  const displayTime = remaining - 17;

  document.getElementById("time").textContent = displayTime.toFixed(1);

  events.forEach(e => {
    if (!e.played && remaining <= e.time) {
      document.getElementById(e.sound).play();
      e.played = true;
    }
  });

  if (remaining > 0) {
    rafId = requestAnimationFrame(update);
  } else {
    running = false;
  }
}

document.getElementById("startBtn").onclick = startTimer;
document.getElementById("stopBtn").onclick = stopTimer;
</script>

</body>
</html>
